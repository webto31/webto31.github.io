<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guada - Nuestros Recuerdos ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #ff1493 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            color: #ff1493;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #000000, 6px 6px 0px rgba(255, 20, 147, 0.3);
            letter-spacing: 2px;
            font-weight: 900;
        }

        .subtitle {
            color: #ff69b4;
            font-size: 1.2em;
            font-style: italic;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .carousel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease;
        }

        .carousel {
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            border-radius: 25px;
            border: 3px solid #ff1493;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.4), 0 15px 35px rgba(0,0,0,0.8);
            background: #000000;
        }

        .carousel-card {
            position: relative;
            width: 100%;
            aspect-ratio: 16/10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            background: #000000;
        }

        .photo-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            color: white;
            padding: 20px;
            transform: translateY(0);
        }

        .photo-counter {
            color: #ff69b4;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .next-btn {
            border: none;
            border-radius: 999px;
            padding: 18px 34px;
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: #111111;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.55);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 45px rgba(255, 20, 147, 0.85);
        }

        .next-btn:active {
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            color: #ff69b4;
            margin-top: 50px;
            font-size: 0.9em;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .love-message {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            color: #ff69b4;
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
            animation: fadeInUp 1s ease 0.2s both;
            border: 2px solid #ff1493;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.4);
        }

        .love-message h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #ff1493;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .love-message p {
            font-size: 1.1em;
            line-height: 1.6;
            opacity: 0.95;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shine {
            0% {
                transform: translate(-100%, -100%) rotate(45deg);
            }
            100% {
                transform: translate(100%, 100%) rotate(45deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .carousel {
                max-width: 100%;
            }

            .love-message h2 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>💕 Guada - Nuestros Recuerdos 💕</h1>
        <p class="subtitle">Los momentos especiales que compartimos</p>
    </header>

    <div class="container">
        <div class="love-message">
            <h2>Para ti, Guada 💚</h2>
            <p>Cada foto es un recuerdo especial de los momentos increíbles que hemos compartido juntos. 
            Aquí guardamos nuestras memorias más bonitas. 💚</p>
        </div>

        <div class="carousel-wrapper">
            <div class="carousel" id="carousel">
                <div class="carousel-card">
                    <img id="carouselImage" class="photo-img" src="" alt="Recuerdo de Guada">
                    <div class="photo-text">
                        <p id="carouselCaption">Recuerdo especial ❤️</p>
                    </div>
                </div>
            </div>
            <div class="photo-counter" id="photoCounter">Cargando fotos...</div>
            <div class="button-row">
                <button class="next-btn" id="prevBtn">← Anterior</button>
                <button class="next-btn" id="nextBtn">Siguiente →</button>
            </div>
        </div>
    </div>

    <footer>
        <p>❤️ Hecho con amor para ti ❤️</p>
    </footer>

    <script>
        const photoPaths = [
            'fotos guada web/WhatsApp Image 2026-06-02 at 12.15.43 AM.jpeg',
            'fotos guada web/WhatsApp Image 2026-06-02 at 12.15.44 AM.jpeg',
            'fotos guada web/WhatsApp Image 2026-06-02 at 12.15.47 AM.jpeg',
            'fotos guada web/WhatsApp Image 2026-06-02 at 12.15.48 AM.jpeg',
            'fotos guada web/WhatsApp Image 2026-06-02 at 12.15.49 AM.jpeg',
            'fotos guada web/foto1.jpeg',
            'fotos guada web/foto2.jpeg',
            'fotos guada web/foto3.jpeg',
            'fotos guada web/foto4.jpeg',
            'fotos guada web/foto6.jpeg',
            'fotos guada web/foto7.jpeg'
        ];

        const carouselImage = document.getElementById('carouselImage');
        const photoCounter = document.getElementById('photoCounter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = Number(localStorage.getItem('galleryIndex')) || 0;

        window.addEventListener('DOMContentLoaded', () => {
            if (!photoPaths.length) {
                photoCounter.textContent = 'No hay fotos disponibles.';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }
            currentIndex = currentIndex % photoPaths.length;
            displayCurrentPhoto();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + photoPaths.length) % photoPaths.length;
            localStorage.setItem('galleryIndex', currentIndex);
            displayCurrentPhoto();
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % photoPaths.length;
            localStorage.setItem('galleryIndex', currentIndex);
            displayCurrentPhoto();
        });

        function displayCurrentPhoto() {
            const path = encodeURI(photoPaths[currentIndex]);
            carouselImage.src = path;
            carouselImage.alt = `Recuerdo ${currentIndex + 1}`;
            photoCounter.textContent = `Foto ${currentIndex + 1} / ${photoPaths.length}`;
        }
    </script>
</body>
</html>
